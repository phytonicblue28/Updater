name: Preise aufzeichnen
 
on:
  schedule:
    - cron: '*/5 * * * *'   # alle 5 Minuten, unabhängig von jedem Browser
  workflow_dispatch: {}       # erlaubt manuelles Auslösen im "Actions"-Tab zum Testen
 
jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/poll-prices.js
        env:
          TANKERKOENIG_API_KEY: ${{ secrets.TANKERKOENIG_API_KEY }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
 
